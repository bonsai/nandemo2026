    function createStudentCard(student, classFolder) {
      const imagePath = `${BASE_PATH}${classFolder}/${student.new_filename}`;
      return `
        <div class="student-cell">
          <div class="polaroid">
            <div class="tape"></div>
            <img src="${imagePath}" alt="${student.name}" loading="lazy">
            <div class="caption">
              <div class="student-name">${student.name}</div>
              <div class="student-detail">
                <span class="label">卒業後の進路:</span>${student.future}
                <span class="label">好きなアニメラブコメ:</span>${student.anime}
                <span class="label">好きなお菓子:</span>${student.snack}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function createClassGridHTML(classFolder, students) {
      const cardsHTML = students.map(s => createStudentCard(s, classFolder)).join('');
      return `<div class="class-grid" style="grid-template-columns: repeat(6, 1fr);">${cardsHTML}</div>`;
    }

    const tabMenu = document.getElementById('tabMenu');
    const classContainer = document.getElementById('classContainer');

    CLASS_NAMES.forEach((className, index) => {
      const classNumber = index + 1;
      const students = MAPPING_DATA.classes[className];

      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (index === 0 ? ' active' : '');
      btn.textContent = `${className}組`;
      btn.dataset.classIndex = classNumber;
      tabMenu.appendChild(btn);

      const panel = document.createElement('div');
      panel.className = 'class-panel' + (index === 0 ? ' active' : '');
      panel.id = `classPanel${classNumber}`;
      panel.dataset.classIndex = classNumber;
      panel.innerHTML = createClassGridHTML(className, students);
      classContainer.appendChild(panel);
    });

    const tabBtns = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.class-panel');

    function switchClass(classIndex) {
      tabBtns.forEach(btn => {
        btn.classList.toggle('active', Number(btn.dataset.classIndex) === classIndex);
      });
      panels.forEach(panel => {
        panel.classList.toggle('active', Number(panel.dataset.classIndex) === classIndex);
      });
    }

    tabBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        switchClass(Number(e.currentTarget.dataset.classIndex));
      });
    });
  })();
